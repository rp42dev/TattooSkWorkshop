{% extends "base.html" %}
{% load static %}

{% block extra_title %}{{ page.seo.title }}{% endblock %}

{% block extra_meta %}
<meta name="title" content="{{ page.seo.title }}" />
<meta name="description" content="{{ page.seo.description }}" />
<meta name="keywords" content="{{ page.seo.keywords }}" />
<meta property="og:title" content="{{ page.seo.title }}" />
<meta property="og:description" content="{{ page.seo.description }}" />
<meta property="og:url" content="{{ request.build_absolute_uri }}" />

{% if page.seo.image %}
<meta property="og:image" content="{{page.seo.image.url}}" />
{% else %}
<meta property="og:image" content="{% static 'images/og-image.png' %}" />
{% endif %}
{% endblock %}

{% block nav %}
<a href="/" class="back" aria-label="Return back to previous page"><i class="fa-solid fa-reply-all"></i></a>
{% endblock %}

{% block content %}
<div class="row mx-auto text-white page_container align-self-center col-12 mb-3 mt-5">

  {% block page_content %}
  {% endblock %}
</div>
{% endblock %}
