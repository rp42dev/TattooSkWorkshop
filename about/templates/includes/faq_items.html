<div class="accordion col-12 col-xl-10 col-xxl-8 mx-auto px-3 d-flex flex-column gap-3" id="faqAccordion">
  {% for item in object_list %}
  <div class="accordion-item glass-card border-0 p-0 overflow-hidden">
    <h2 class="accordion-header" id="heading{{ forloop.counter }}">
      <button class="accordion-button collapsed bg-transparent text-light px-4 py-3 fw-bold" type="button" data-bs-toggle="collapse"
        data-bs-target="#collapse{{ forloop.counter }}" aria-expanded="false" aria-controls="collapse{{ forloop.counter }}">
        <span class="me-3 text-primary">0{{ forloop.counter }}.</span>
        {{ item.question }}
      </button>
    </h2>
    <div id="collapse{{ forloop.counter }}" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">
      <div class="accordion-body text-light opacity-75 px-4 pb-4 pt-0">
        <div class="gradient-line ms-0 mb-3" style="width: 50px;"></div>
        {{ item.answer|safe }}
      </div>
    </div>
  </div>
  {% endfor %}
</div>
<div class="col-12 col-xl-10 col-xxl-8 mx-auto my-4">
  <div class="mx-3">
    {% include 'includes/contact_card.html' %}
  </div>
</div>
